<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family:OldLondon;
            src: url(fontes/OldLondon.ttf) format(TrueType);
            font-weight: normal;
            font-style: normal;

         /*
           Tipos De Format()
           - opentype (otf)
           - truetype (ttf)
           - embedded-opentype
           - truetype-aat (Apple Advanced Typography)
           - svg       
         */   
        }
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-family: 'OldLondon', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Placeat quam quasi repellat magnam facere mollitia aspernatur? Esse odio asperiores rem, ea possimus saepe. Vero culpa illum, voluptas in dignissimos quidem.</p>
</body>
</html>
